name: Build Legend of Mir 2
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build
        run: dotnet publish "Legend of Mir.sln" -c Release -o ./publish -r linux-x64 --self-contained
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mir2-linux-server
          path: ./publish