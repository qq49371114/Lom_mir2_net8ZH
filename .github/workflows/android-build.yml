name: Build Legend of Mir 2 Android
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          
      - name: Install Android Workload
        run: dotnet workload install android
        
      - name: Restore Dependencies
        run: dotnet restore "Client_MonoGame.Android/Client_MonoGame.Android.csproj"
        
      - name: Build Android APK
        run: dotnet build "Client_MonoGame.Android/Client_MonoGame.Android.csproj" -c Release -f net8.0-android --no-restore
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mir2-android-client
          path: Client_MonoGame.Android/bin/Release/net8.0-android/*-Signed.apk
